<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SleepSound preview — Empty state</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&family=Inter:wght@300;400;500&display=swap"
  rel="stylesheet">
<style>
  :root {
    --pure-black: #000000;
    --surface-dark: #111111;
    --dimmer-grey: #333333;
    --dim-grey: #666666;
    --icon-grey: #888888;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--pure-black); color:var(--dim-grey);
    font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  .device { width:412px; height:915px; background:var(--pure-black); position:relative;
    display:flex; flex-direction:column; overflow:hidden; }
  .header { position:relative; width:100%; height:64px; display:flex; align-items:center;
    justify-content:center; padding:8px; }
  .status { color:var(--dimmer-grey); font-size:15px; font-weight:300; }
  .settings-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); padding:12px;
    color:var(--dimmer-grey); }
  .material-symbols-outlined { font-family:'Material Symbols Outlined'; font-weight:400; font-size:24px;
    display:inline-block; line-height:1; -webkit-font-smoothing:antialiased; font-feature-settings:'liga'; }
  .grid { flex:1; padding:8px 16px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
    align-content:start; }
  .tile { aspect-ratio:1/1; border-radius:12px; background:var(--pure-black);
    border:1px solid transparent; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:8px; gap:6px; }
  .tile-icon { font-size:28px; color:var(--dimmer-grey); }
  .tile-label { font-size:11px; color:var(--dimmer-grey); text-align:center; line-height:1.15; }
  .controls { width:100%; padding:16px; display:flex; justify-content:space-between; align-items:center; }
  .timer-pill { background:var(--surface-dark); border-radius:20px; padding:10px 16px;
    display:inline-flex; align-items:center; gap:6px; color:var(--dim-grey); font-size:14px; }
  .timer-pill .material-symbols-outlined { font-size:16px; color:var(--icon-grey); }
</style>
</head>
<body>
  <div class="device">
    <div class="header">
      <div class="status">Tap a sound</div>
      <div class="settings-btn"><span class="material-symbols-outlined">settings</span></div>
    </div>
    <div class="grid">
      <div class="tile"><span class="material-symbols-outlined tile-icon">graphic_eq</span><div class="tile-label">Brown noise</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">blur_on</span><div class="tile-label">Pink noise</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">circle</span><div class="tile-label">White noise</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">bolt</span><div class="tile-label">Violet noise</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">tv</span><div class="tile-label">TV static</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">water_drop</span><div class="tile-label">Rain</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">thunderstorm</span><div class="tile-label">Thunderstorm</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">local_laundry_service</span><div class="tile-label">Dryer</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">waves</span><div class="tile-label">Ocean</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">air</span><div class="tile-label">Fan</div></div>
      <div class="tile"><span class="material-symbols-outlined tile-icon">local_fire_department</span><div class="tile-label">Fireplace</div></div>
    </div>
    <div class="controls">
      <div class="timer-pill">
        <span class="material-symbols-outlined">timer</span>
        <span>Timer off</span>
      </div>
    </div>
  </div>
</body>
</html>
